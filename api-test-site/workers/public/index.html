<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API 测试站</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light">
    <div class="page">
      <header class="topbar">
        <div>
          <div class="brand">✨ API 测试站</div>
          <div class="subtitle">临时会话，不做本地持久化，刷新即丢</div>
        </div>
        <div class="topbar-actions">
          <button id="fillDemoBtn" class="ghost-btn" type="button">填入示例</button>
          <button id="themeToggle" class="theme-btn" type="button">🌙 切换暗色</button>
        </div>
      </header>

      <div class="layout">
        <section class="left-column">
          <div class="card form-card">
            <div class="section-title">连接设置</div>

            <div class="row2">
              <label>Base URL
                <input id="baseUrl" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="例如 https://api.example.com/v1" />
              </label>
              <label>API 模式
                <select id="mode">
                  <option value="auto">自动识别</option>
                  <option value="openai">OpenAI 兼容</option>
                  <option value="anthropic">Anthropic Messages</option>
                </select>
              </label>
            </div>

            <label>API Key（可选）
              <input id="apiKey" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="留空则仅做连通性测试" />
            </label>

            <div class="row2">
              <label>手动路径（可选）
                <input id="manualPath" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="例如 /models 或 /chat/completions" />
              </label>
              <label>可用模型
                <select id="modelSelect"></select>
              </label>
            </div>

            <div class="actions">
              <button id="probeBtn" type="button">探测 / 获取模型</button>
              <button id="clearBtn" class="secondary" type="button">清空当前页</button>
            </div>

            <div class="tips">
              <span class="pill">OpenAI</span>
              <span class="pill">Responses</span>
              <span class="pill">Chat Completions</span>
              <span class="pill">Anthropic Messages</span>
            </div>
          </div>

          <div class="card status-card">
            <div class="section-title">状态</div>
            <div id="statusBar" class="status-bar">等待测试…</div>
            <div id="statusHint" class="status-hint">先探测模型，成功后再在右侧聊天。</div>
          </div>
        </section>

        <section class="card chat-card">
          <div class="chat-head">
            <div>
              <div class="section-title">聊天测试</div>
              <div class="chat-subtitle">像临时 AI 聊天站一样测试接口；桌面端 Enter 发送、Shift+Enter 换行，手机端点发送。</div>
            </div>
          </div>

          <div id="chatTimeline" class="chat-timeline">
            <div class="chat-empty">先探测模型，再在这里发起聊天测试。</div>
          </div>

          <div class="chat-composer card-inner">
            <textarea id="message" rows="4" autocomplete="off" placeholder="输入消息…"></textarea>
            <div class="composer-actions">
              <div class="composer-tip" id="composerTip">桌面端 Enter 发送，Shift+Enter 换行</div>
              <button id="chatBtn" type="button">发送聊天测试</button>
            </div>
          </div>
        </section>
      </div>

      <section class="card info-card wide-info">
        <div class="result-head">
          <div>
            <div class="section-title">INFO</div>
            <div class="info-subtitle">这里放调试信息、路径尝试、接口原始返回，方便排查。</div>
          </div>
        </div>
        <pre id="result">等待测试…</pre>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
